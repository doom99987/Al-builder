<!DOCTYPE html>
<html>
<title>
  AL Builder
</title>
<head>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="app">

  <!-- Top tabs -->
  <div class="tabbar">
    <button class="tab active" data-tab="stats">Stats</button>
    <button class="tab" data-tab="mastery">Mastery</button>
    <button class="tab" data-tab="Moves">Info</button>
    <button class="tab" data-tab="sould-tree">Soul Tree</button>
    <button class="tab" data-tab="dmg-calc">Dmg Calc</button>
  </div>

  <!-- Content area -->
  <div class="content">

    <div class="panel active" id="stats">
      <div class="stats-columns">

        <div class="marks-section">
          <h2>Marks</h2>
          <div class="gear-slot">
            <label class="gear-label">Mark</label>
            <select class="mark-picker" id="mark-1">
              <option value="">— None —</option>
            </select>
          </div>

          <h2 class="gear-sub-header">Shards</h2>
          <div class="shards-grid">
            <div class="shard-slot"><label class="shard-label">S1</label><select class="shard-picker" id="shard-1"><option value="">—</option></select></div>
            <div class="shard-slot"><label class="shard-label">S2</label><select class="shard-picker" id="shard-2"><option value="">—</option></select></div>
            <div class="shard-slot"><label class="shard-label">S3</label><select class="shard-picker" id="shard-3"><option value="">—</option></select></div>
            <div class="shard-slot"><label class="shard-label">S4</label><select class="shard-picker" id="shard-4"><option value="">—</option></select></div>
            <div class="shard-slot"><label class="shard-label">S5</label><select class="shard-picker" id="shard-5"><option value="">—</option></select></div>
            <div class="shard-slot"><label class="shard-label">S6</label><select class="shard-picker" id="shard-6"><option value="">—</option></select></div>
            <div class="shard-slot"><label class="shard-label">S7</label><select class="shard-picker" id="shard-7"><option value="">—</option></select></div>
          </div>
        </div>

        <div class="stats-left">
          <h2>Stats</h2>

          <div class="box">
            Points Remaining: <span id="points-left"></span>
          </div>

          <div class="box-row">
            <div class="box">
              Lvl: <input id="Lvl" type="number" value="1" min="1" max="40">
            </div>
            <div class="box">
              Gold: <span id="Gold">0</span>
            </div>
          </div>

          <div class="race-row">
            <label class="race-label">Race</label>
            <select id="race-picker">
              <option value="">— Select Race —</option>
            </select>
          </div>

          <div class="race-row">
            <label class="race-label">Class</label>
            <select id="class-picker" disabled>
              <option value="">— Select Class —</option>
            </select>
          </div>
          <div class="class-cost-note">Req. Lvl 5</div>

          <div class="race-row">
            <label class="race-label">Super</label>
            <select id="super-picker" disabled>
              <option value="">— Select Class First —</option>
            </select>
          </div>

          <div class="stat-list">
            <div class="stat-row" data-stat="str">
              <span class="stat-name">STR</span>
              <span class="stat-base"></span>
              <button class="stat-btn minus">−</button>
              <input class="stat-val" type="number" value="0" min="0">
              <button class="stat-btn plus">+</button>
            </div>
            <div class="stat-row" data-stat="arc">
              <span class="stat-name">ARC</span>
              <span class="stat-base"></span>
              <button class="stat-btn minus">−</button>
              <input class="stat-val" type="number" value="0" min="0">
              <button class="stat-btn plus">+</button>
            </div>
            <div class="stat-row" data-stat="end">
              <span class="stat-name">END</span>
              <span class="stat-base"></span>
              <button class="stat-btn minus">−</button>
              <input class="stat-val" type="number" value="0" min="0">
              <button class="stat-btn plus">+</button>
            </div>
            <div class="stat-row" data-stat="spd">
              <span class="stat-name">SPD</span>
              <span class="stat-base"></span>
              <button class="stat-btn minus">−</button>
              <input class="stat-val" type="number" value="0" min="0">
              <button class="stat-btn plus">+</button>
            </div>
            <div class="stat-row" data-stat="lck">
              <span class="stat-name">LCK</span>
              <span class="stat-base"></span>
              <button class="stat-btn minus">−</button>
              <input class="stat-val" type="number" value="0" min="0">
              <button class="stat-btn plus">+</button>
            </div>
          </div>

          <div class="stat-percent">
            <div class="percent-item" data-stat="str">
              <span class="percent-val" id="str-pct">—</span>
              <span class="percent-label">phys%</span>
            </div>
            <div class="percent-item" data-stat="arc">
              <span class="percent-val" id="arc-pct">—</span>
              <span class="percent-label">arc%</span>
            </div>
            <div class="percent-item" data-stat="end">
              <span class="percent-val" id="end-pct">—</span>
              <span class="percent-label">hp</span>
            </div>
            <div class="percent-item" data-stat="spd">
              <span class="percent-val" id="spd-pct">—</span>
              <span class="percent-label">spd%</span>
            </div>
            <div class="percent-item" data-stat="crit-chance">
              <span class="percent-val" id="crit-chance-pct">—</span>
              <span class="percent-label">crit%</span>
            </div>
            <div class="percent-item" data-stat="crit-dmg">
              <span class="percent-val" id="crit-dmg-pct">—</span>
              <span class="percent-label">crit dmg%</span>
            </div>
            <div class="percent-item" data-stat="out-heal">
              <span class="percent-val" id="out-heal-pct">—</span>
              <span class="percent-label">out heal</span>
            </div>
            <div class="percent-item" data-stat="inc-heal">
              <span class="percent-val" id="inc-heal-pct">—</span>
              <span class="percent-label">in heal</span>
            </div>
          </div>
        </div>

        <div class="gear-section">
          <h2>Gears</h2>
          <div class="gear-slot">
            <label class="gear-label">Gear 1</label>
            <select class="gear-picker" id="gear-1">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="gear-slot">
            <label class="gear-label">Gear 2</label>
            <select class="gear-picker" id="gear-2">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="gear-slot">
            <label class="gear-label">Gear 3</label>
            <select class="gear-picker" id="gear-3">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="gear-slot">
            <label class="gear-label">Gear 4</label>
            <select class="gear-picker" id="gear-4">
              <option value="">— None —</option>
            </select>
          </div>

          <h2 class="gear-sub-header">Weapons</h2>
          <div class="gear-slot">
            <label class="gear-label">Weapon</label>
            <select class="weapon-picker" id="weapon-main">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="gear-slot">
            <label class="gear-label">Off Hand</label>
            <select class="weapon-picker" id="weapon-offhand">
              <option value="">— None —</option>
            </select>
          </div>

          <h2 class="gear-sub-header">Armour</h2>
          <div class="gear-slot">
            <label class="gear-label">Armour</label>
            <select class="armour-picker" id="armour-main">
              <option value="">— None —</option>
            </select>
          </div>
        </div>

      </div>
    </div>

    <div class="panel" id="Moves">
      <div class="moves-container">
        <div class="enchant-info-section">
          <h3 class="moves-section-title">Enchants</h3>
          <div class="enchant-info-row">
            <select id="enchant-picker">
              <option value="">— None —</option>
            </select>
            <div id="enchant-desc" class="enchant-desc"></div>
          </div>
        </div>
        <div id="moves-content">
          <p class="moves-placeholder">Select a race or class to view moves.</p>
        </div>
      </div>
    </div>

    <div class="panel" id="sould-tree">
      <div id="soul-tree-content"></div>
    </div>

    <div class="panel" id="mastery">
      <div class="mastery-wrap">
        <div class="mastery-stats-bar">
          <div class="mastery-tracker-box">Points Used: <b id="mastery-pts-used">0</b> / 35</div>
          <div class="mastery-tracker-box">Echo Shards Used: <b id="mastery-shards-used">0</b></div>
          <button class="mastery-reset-btn" onclick="resetMastery()">Reset</button>
        </div>
        <div class="mastery-tree-container" id="mastery-tree-container"></div>
      </div>
    </div>

    <div class="panel" id="dmg-calc">
      <h2>Dmg Calculator</h2>
      <p>WIP</p>
    </div>

  </div>

</div>

<script src="js/scripts.js"></script>
</body>
</html>
