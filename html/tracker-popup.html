<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AL Builder — Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
    }
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }
    #hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e1e1e;
    }
    .tracker-title {
      font-family: 'Rajdhani', Arial, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .vt-modal-hint { font-size: 12px; color: #555; }
    .vt-hint-green { color: #55ee77; font-weight: 600; }
    .vt-hint-red   { color: #ee5555; font-weight: 600; }

    /* Tabs */
    .vt-tabs-bar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
      padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; margin-bottom: 2px;
    }
    .vt-tab-wrap {
      display: flex; align-items: stretch; border-radius: 4px; overflow: hidden;
      border: 1px solid #252525; background: #111;
    }
    .vt-tab-wrap.vt-tab-active { border-color: #4a3a88; background: #1a1230; }
    .vt-tab-btn {
      background: none; border: none; color: #666;
      font-family: 'Rajdhani', Arial, sans-serif; font-size: 13px; font-weight: 600;
      padding: 5px 12px; cursor: pointer; letter-spacing: 0.3px;
      transition: color 0.15s; white-space: nowrap;
    }
    .vt-tab-wrap.vt-tab-active .vt-tab-btn { color: #c4b5fd; }
    .vt-tab-btn:hover { color: #aaa; }
    .vt-tab-del {
      background: none; border: none; border-left: 1px solid #252525; color: #444;
      font-size: 14px; padding: 4px 7px; cursor: pointer; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .vt-tab-del:hover { color: #ee5555; background: #2a0f0f; }
    .vt-tab-add {
      background: none; border: 1px dashed #2a2a2a; border-radius: 4px; color: #484848;
      font-family: 'Rajdhani', Arial, sans-serif; font-size: 12px; font-weight: 600;
      padding: 5px 10px; cursor: pointer; letter-spacing: 0.3px;
      transition: color 0.15s, border-color 0.15s; white-space: nowrap;
    }
    .vt-tab-add:hover { color: #9988dd; border-color: #4a3a88; }

    /* Tier bar */
    .pt-tier-bar { display: flex; align-items: center; gap: 6px; padding: 6px 0 2px; }
    .pt-tier-label {
      font-family: 'Rajdhani', Arial, sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: #444; margin-right: 2px;
    }
    .pt-tier-btn {
      background: #111; border: 1px solid #252525; border-radius: 4px; color: #555;
      font-family: 'Rajdhani', Arial, sans-serif; font-size: 12px; font-weight: 700;
      padding: 4px 14px; cursor: pointer; letter-spacing: 0.3px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .pt-tier-btn:hover { color: #aaa; border-color: #3a3a3a; }
    .pt-tier-btn.pt-tier-active { background: #1a1230; border-color: #4a3a88; color: #c4b5fd; }

    /* Venia grid */
    .vt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
    .vt-col { display: flex; flex-direction: column; gap: 3px; }
    .vt-col-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 8px; border-bottom: 1px solid #252525; margin-bottom: 4px;
      font-family: 'Rajdhani', Arial, sans-serif; font-size: 13px; font-weight: 700; color: #aaa;
    }
    .vt-col-warn { font-size: 10px; font-weight: 700; color: #cc8833; letter-spacing: 0.3px; margin-left: auto; margin-right: 6px; }
    .vt-reset-btn {
      background: none; border: 1px solid #252525; border-radius: 3px; color: #555;
      font-size: 10px; padding: 2px 6px; cursor: pointer; font-family: inherit;
      transition: color 0.12s, border-color 0.12s;
    }
    .vt-reset-btn:hover { color: #cc5555; border-color: #cc5555; }
    .vt-cat-label {
      font-size: 9px; font-weight: 700; color: #444; text-transform: uppercase;
      letter-spacing: 0.6px; padding: 7px 0 2px;
    }

    /* Rows */
    .vt-artifact-row {
      display: flex; align-items: center; gap: 6px; width: 100%;
      background: #111; border: 1px solid #1e1e1e; border-radius: 4px; color: #777;
      font-size: 11px; padding: 5px 8px; cursor: pointer; text-align: left;
      font-family: inherit; transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .vt-artifact-row:hover { background: #181818; border-color: #333; color: #ccc; }
    .vt-artifact-icon { font-size: 11px; flex-shrink: 0; width: 12px; text-align: center; }
    .vt-state-green { background: #081a0d; border-color: #1a4a25; color: #55ee77; }
    .vt-state-green:hover { background: #0a2010; border-color: #255530; color: #77ff99; }
    .vt-state-red   { background: #1a0808; border-color: #4a1a1a; color: #ee5555; }
    .vt-state-red:hover   { background: #200d0d; border-color: #552525; color: #ff7777; }
    .vt-state-collected { background: #0a0a0a; border-color: #1a1a1a; color: #2a2a2a; }
    .vt-state-collected:hover { background: #111; border-color: #222; color: #333; }

    /* Petent */
    .pt-loc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .pt-section-hdr {
      font-family: 'Rajdhani', Arial, sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: #444;
      padding: 8px 0 4px; border-top: 1px solid #1a1a1a; margin-top: 4px;
    }
    .pt-section-hdr:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .pt-info-note { font-size: 11px; color: #4a4a4a; font-style: italic; padding: 2px 0 4px; line-height: 1.5; }
    .pt-mob-note { font-size: 10px; color: #555; font-style: italic; }

    @media (max-width: 600px) {
      .vt-grid { grid-template-columns: repeat(2, 1fr); }
      .pt-loc-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span class="tracker-title" id="tracker-title">Tracker</span>
  </div>
  <div class="vt-tabs-bar" id="tracker-tabs"></div>

  <!-- Venia-specific -->
  <div id="venia-section" style="display:none; flex-direction:column; gap:10px;">
    <div class="pt-tier-bar" id="venia-tracker-tier"></div>
    <p class="vt-modal-hint">Click once for <span class="vt-hint-green">accepted ✓</span>, again for <span class="vt-hint-red">rejected ✕</span>, once more to clear. Double-click a tab to rename it.</p>
    <div class="vt-grid" id="venia-tracker-grid"></div>
  </div>

  <!-- Petent-specific -->
  <div id="petent-section" style="display:none; flex-direction:column; gap:10px;">
    <div class="pt-tier-bar" id="petent-tracker-tier"></div>
    <p class="vt-modal-hint">Click once for <span class="vt-hint-green">done ✓</span>, again to clear. Tier 1-only items hide when Tier 2+ is selected.</p>
    <div id="petent-tracker-grid"></div>
  </div>

  <!-- Astra-specific -->
  <div id="astra-section" style="display:none; flex-direction:column; gap:10px;">
    <p class="vt-modal-hint">Click to mark <span class="vt-hint-green">done ✓</span>, click again to clear.</p>
    <div id="astra-tracker-grid"></div>
  </div>
</div>
<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const TRACKER = params.get('tracker') || 'venia'; // venia | petent | astra

  // ── Show the right section ────────────────────────────────────────────────
  const titles = { venia: 'Venia Orb Tracker', petent: 'Petent Tracker', astra: 'Astra Tracker' };
  document.getElementById('tracker-title').textContent = titles[TRACKER] || 'Tracker';
  document.title = 'AL Builder — ' + (titles[TRACKER] || 'Tracker');
  ['venia','petent','astra'].forEach(t => {
    const el = document.getElementById(t + '-section');
    if (el) el.style.display = (t === TRACKER) ? 'flex' : 'none';
  });

  // ── Shared tab ID pointing to the same element ────────────────────────────
  // All three render functions expect their own IDs; the tabs bar is shared as #tracker-tabs
  // We alias it by renaming the tab container ID dynamically.
  const tabsEl = document.getElementById('tracker-tabs');
  tabsEl.id = TRACKER + '-tracker-tabs';

  // ── VENIA ─────────────────────────────────────────────────────────────────
  const VENIA_ORBS = ['Caldera Orb', 'Blades Orb', 'Deeproot Orb', 'Icerift Orb'];
  const VENIA_ARTIFACTS = [
    { name: 'Memory Fragment',     category: 'Lesser Artifact' },
    { name: 'Soul Dust',           category: 'Lesser Artifact' },
    { name: 'Lineage Shard',       category: 'Lesser Artifact' },
    { name: 'Phoenix Tear',        category: 'Lesser Artifact' },
    { name: 'Resplendent Essence', category: 'Lesser Artifact' },
    { name: 'Void Key',            category: 'Lesser Artifact' },
    { name: 'Echo Shard',          category: 'Lesser Artifact' },
    { name: 'Reality Watch',       category: "Yar'thul Drop" },
    { name: "Narthana's Sigil",    category: "Yar'thul Drop" },
    { name: 'Shifting Hourglass',  category: "Yar'thul Drop" },
    { name: 'Dark Sigil',          category: 'Thorian Drop' },
    { name: "Metrom's Amulet",     category: 'Thorian Drop' },
    { name: 'Stellian Core',       category: 'Thorian Drop' },
    { name: 'Chaos Orb',           category: "Metrom's / Other" },
    { name: 'Skyward Totem',       category: "Metrom's / Other" },
  ];
  const VT_KEY = 'al-venia-tracker';
  function vtGetMeta() {
    try {
      const raw = JSON.parse(localStorage.getItem(VT_KEY));
      if (raw && Array.isArray(raw.tabs)) return raw;
      return { tabs: [{ id: 't1', name: 'Run 1', data: raw || {} }], activeTab: 't1' };
    } catch { return { tabs: [{ id: 't1', name: 'Run 1', data: {} }], activeTab: 't1' }; }
  }
  function vtSaveMeta(meta) { localStorage.setItem(VT_KEY, JSON.stringify(meta)); }
  function vtNewId()        { return 't' + Date.now(); }
  function vtActiveTab(meta){ return meta.tabs.find(t => t.id === meta.activeTab) || meta.tabs[0]; }
  function vtGetData(meta)  { return vtActiveTab(meta).data; }
  function vtSetData(meta,d){ vtActiveTab(meta).data = d; }
  function vtGet(d,orb,art) { return d[orb]?.[art] || 0; }
  function vtGetTier(meta)  { return vtActiveTab(meta).tier || 1; }
  function vtSetTier(meta,t){ vtActiveTab(meta).tier = t; }

  function vtRenderTier() {
    const el = document.getElementById('venia-tracker-tier'); if (!el) return;
    const meta = vtGetMeta(); const tier = vtGetTier(meta);
    el.innerHTML = '';
    const label = document.createElement('span'); label.className = 'pt-tier-label'; label.textContent = 'Tier:'; el.appendChild(label);
    [1,2,3,4,5].forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'pt-tier-btn' + (tier === t ? ' pt-tier-active' : '');
      btn.textContent = 'Tier ' + t;
      btn.addEventListener('click', () => { const m = vtGetMeta(); vtSetTier(m,t); vtSaveMeta(m); vtRender(); });
      el.appendChild(btn);
    });
  }

  function vtRenderTabs(meta) {
    const tabsEl = document.getElementById('venia-tracker-tabs'); if (!tabsEl) return;
    tabsEl.innerHTML = '';
    meta.tabs.forEach(tab => {
      const wrap = document.createElement('div');
      wrap.className = 'vt-tab-wrap' + (tab.id === meta.activeTab ? ' vt-tab-active' : '');
      const nameBtn = document.createElement('button');
      nameBtn.className = 'vt-tab-btn'; nameBtn.textContent = tab.name;
      nameBtn.title = 'Click to switch · Double-click to rename';
      nameBtn.addEventListener('click', () => { meta.activeTab = tab.id; vtSaveMeta(meta); vtRender(); });
      nameBtn.addEventListener('dblclick', e => {
        e.stopPropagation();
        const newName = prompt('Rename tab:', tab.name);
        if (newName && newName.trim()) { tab.name = newName.trim(); vtSaveMeta(meta); vtRender(); }
      });
      wrap.appendChild(nameBtn);
      if (meta.tabs.length > 1) {
        const delBtn = document.createElement('button'); delBtn.className = 'vt-tab-del'; delBtn.textContent = '×'; delBtn.title = 'Delete tab';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm('Delete "' + tab.name + '"?')) return;
          const idx = meta.tabs.findIndex(t => t.id === tab.id);
          meta.tabs.splice(idx, 1);
          if (meta.activeTab === tab.id) meta.activeTab = meta.tabs[Math.max(0, idx-1)].id;
          vtSaveMeta(meta); vtRender();
        });
        wrap.appendChild(delBtn);
      }
      tabsEl.appendChild(wrap);
    });
    const addBtn = document.createElement('button'); addBtn.className = 'vt-tab-add'; addBtn.textContent = '+ Add Tab';
    addBtn.addEventListener('click', () => {
      const name = prompt('Tab name:', 'Run ' + (meta.tabs.length + 1));
      if (!name || !name.trim()) return;
      const id = vtNewId();
      meta.tabs.push({ id, name: name.trim(), data: {} }); meta.activeTab = id;
      vtSaveMeta(meta); vtRender();
    });
    tabsEl.appendChild(addBtn);
  }

  function vtRender() {
    if (TRACKER !== 'venia') return;
    const meta = vtGetMeta(); const data = vtGetData(meta); const tier = vtGetTier(meta);
    vtRenderTabs(meta); vtRenderTier();
    const grid = document.getElementById('venia-tracker-grid'); if (!grid) return;
    grid.innerHTML = '';
    VENIA_ORBS.forEach(orb => {
      const col = document.createElement('div'); col.className = 'vt-col';
      const greenCount = VENIA_ARTIFACTS.filter(a => vtGet(data, orb, a.name) === 1).length;
      const colReady   = tier === 1 || greenCount === 3;
      const hdr = document.createElement('div'); hdr.className = 'vt-col-hdr';
      const warnSpan = (tier > 1 && !colReady) ? '<span class="vt-col-warn">' + greenCount + '/3 T1 picks</span>' : '';
      hdr.innerHTML = '<span>' + orb + '</span>' + warnSpan + '<button class="vt-reset-btn" onclick="vtOrbReset(\'' + CSS.escape(orb) + '\')">Reset</button>';
      col.appendChild(hdr);
      let lastCat = null;
      VENIA_ARTIFACTS.forEach(a => {
        if (a.category !== lastCat) {
          const catDiv = document.createElement('div'); catDiv.className = 'vt-cat-label'; catDiv.textContent = a.category; col.appendChild(catDiv); lastCat = a.category;
        }
        const val      = vtGet(data, orb, a.name);
        const tierPick = tier > 1 ? (data.tierPicks?.[tier]?.[orb]?.[a.name] || 0) : 0;
        let cls, icon;
        if (tier > 1 && colReady) {
          if (val === 1) { cls = tierPick ? 'vt-state-green' : 'vt-state-collected'; icon = tierPick ? '✓' : '○'; }
          else           { cls = 'vt-state-red'; icon = '✕'; }
        } else {
          cls  = val === 1 ? 'vt-state-green' : val === 2 ? 'vt-state-red' : '';
          icon = val === 1 ? '✓' : val === 2 ? '✕' : '○';
        }
        const row = document.createElement('button');
        row.className = 'vt-artifact-row ' + cls;
        row.innerHTML = '<span class="vt-artifact-icon">' + icon + '</span><span class="vt-artifact-name">' + a.name + '</span>';
        row.addEventListener('click', () => {
          const m = vtGetMeta(); const d = vtGetData(m); const curTier = vtGetTier(m); const curVal = vtGet(d, orb, a.name);
          if (curTier > 1 && curVal === 1) {
            if (!d.tierPicks) d.tierPicks = {};
            if (!d.tierPicks[curTier]) d.tierPicks[curTier] = {};
            if (!d.tierPicks[curTier][orb]) d.tierPicks[curTier][orb] = {};
            d.tierPicks[curTier][orb][a.name] = d.tierPicks[curTier][orb][a.name] ? 0 : 1;
          } else {
            if (!d[orb]) d[orb] = {};
            d[orb][a.name] = (vtGet(d, orb, a.name) + 1) % 3;
          }
          vtSetData(m, d); vtSaveMeta(m); vtRender();
        });
        col.appendChild(row);
      });
      grid.appendChild(col);
    });
  }
  window.vtOrbReset = function(orb) {
    const m = vtGetMeta(); const d = vtGetData(m); d[orb] = {}; vtSetData(m,d); vtSaveMeta(m); vtRender();
  };

  // ── PETENT ────────────────────────────────────────────────────────────────
  const PETENT_MOBS = [
    { name: 'Slime', note: '', t1: false }, { name: 'Thief', note: '', t1: false },
    { name: 'Mushroom', note: '', t1: false }, { name: 'Grass Spirit', note: '', t1: false },
    { name: 'Goblin', note: '', t1: false }, { name: 'Gon', note: '', t1: false },
    { name: 'Thanasludd', note: '', t1: false }, { name: 'Desert Bandit', note: '', t1: false },
    { name: 'Sand Elemental', note: '', t1: false }, { name: 'Stray Sandstorm', note: '', t1: false },
    { name: 'Sand Golem', note: '', t1: false }, { name: 'Night Raider', note: '', t1: false },
    { name: 'Duneguard', note: '', t1: false }, { name: 'Lava Golem', note: '', t1: false },
    { name: 'Lava Crab', note: '', t1: false }, { name: 'Fog Spirit', note: '', t1: false },
    { name: 'Venom Shroom', note: '', t1: false }, { name: 'Cursed Corpse', note: '', t1: false },
    { name: 'Cess Horror', note: '', t1: false }, { name: 'Sentient Darkness', note: '', t1: false },
    { name: 'Ptoruco', note: '', t1: false }, { name: 'Shadeblade', note: 'Tier 1 only', t1: true },
    { name: 'Star Slime', note: '', t1: false }, { name: 'The Smallest Boulder', note: '', t1: false },
  ];
  const PETENT_BOSSES = [
    { name: "Yar'thul", note: '', t1: false }, { name: 'Thorian', note: '', t1: false },
    { name: 'Handaconda', note: '', t1: false }, { name: "Metrom's Vessel", note: 'Tier 1 only', t1: true },
  ];
  const PETENT_LOCATIONS = [
    { name: 'Caldera', note: '', t1: false }, { name: 'Crossing', note: '', t1: false },
    { name: 'Icerift Approach', note: '', t1: false }, { name: 'Waving Sands', note: '', t1: false },
    { name: 'The Old Ruins', note: '', t1: false }, { name: 'Sanctuary of the Blades', note: '', t1: false },
    { name: 'Mount Thul', note: '', t1: false }, { name: 'Inferno Chamber', note: "Yar'thul Arena", t1: false },
    { name: 'Westwood', note: '', t1: false }, { name: 'Deeproot Canopy', note: '', t1: false },
    { name: 'Deeproot Depths', note: '', t1: false }, { name: 'Cessgrounds', note: '', t1: false },
    { name: 'Amoran Chasm', note: '', t1: false }, { name: 'Cursed Remnants', note: 'Thorian arena', t1: false },
    { name: 'Forgotten Sanctum', note: 'Lifesong', t1: false },
    { name: 'Temporal Jailhouse', note: 'MV Arena · needed all tiers (bugged)', t1: false },
    { name: 'Fragmented Jailhouse', note: 'MV Phase 2', t1: false },
    { name: 'Spirit Realm', note: 'Meditation', t1: false }, { name: 'Illustris', note: 'Church', t1: false },
    { name: 'Temple of Norn', note: 'Cult', t1: false },
  ];
  const PETENT_VOID_TRIALS = [
    { name: 'Zombie Mushroom', note: 'Icerift void', t1: false },
    { name: 'Sand Golem', note: '', t1: false }, { name: 'Corpse', note: '', t1: false },
  ];
  const PETENT_QUESTS = [
    { name: 'Starter Quest (Daze)', note: '', t1: false }, { name: 'Potion Help', note: '', t1: false },
    { name: 'Package Delivery', note: '', t1: false }, { name: 'Guild Request Help', note: '', t1: false },
    { name: 'Spare Gold?', note: '', t1: false }, { name: "Sky Man's Request", note: '', t1: false },
    { name: 'Looking for Help', note: '', t1: false }, { name: "Bone Man's Request", note: '', t1: false },
    { name: 'Ingredient Help', note: 'Chaotic', t1: false }, { name: 'Ingredient Help', note: 'Orderly', t1: false },
    { name: 'Taking in the Sights', note: 'Push the guy', t1: false },
    { name: 'Someone Is Going to Die', note: '', t1: false },
    { name: 'Crylight Request', note: '', t1: false }, { name: "Leaf Man's Quest", note: '', t1: false },
    { name: "Tor'run's Final Request", note: '', t1: false },
  ];
  const PETENT_FINAL = [{ name: 'Place a Void Key into the soul vault', note: '', t1: false }];

  const PT_KEY = 'al-petent-tracker';
  function ptGetMeta() {
    try {
      const raw = JSON.parse(localStorage.getItem(PT_KEY));
      if (raw && Array.isArray(raw.tabs)) return raw;
      return { tabs: [{ id: 'p1', name: 'Run 1', tier: 1, data: {} }], activeTab: 'p1' };
    } catch { return { tabs: [{ id: 'p1', name: 'Run 1', tier: 1, data: {} }], activeTab: 'p1' }; }
  }
  function ptSaveMeta(meta) { localStorage.setItem(PT_KEY, JSON.stringify(meta)); }
  function ptNewId()        { return 'p' + Date.now(); }
  function ptActiveTab(meta){ return meta.tabs.find(t => t.id === meta.activeTab) || meta.tabs[0]; }
  function ptGetTier(meta)  { return ptActiveTab(meta).tier || 1; }
  function ptSetTier(meta,t){ ptActiveTab(meta).tier = t; }
  function ptGetData(meta) {
    const d = ptActiveTab(meta).data;
    if (!d.locs) d.locs={}; if (!d.mobs) d.mobs={}; if (!d.bosses) d.bosses={};
    if (!d.quests) d.quests={}; if (!d.voidTrials) d.voidTrials={}; if (!d.final) d.final={};
    return d;
  }
  function ptSetData(meta,d){ ptActiveTab(meta).data = d; }

  function ptRenderTabs(meta) {
    const tabsEl = document.getElementById('petent-tracker-tabs'); if (!tabsEl) return;
    tabsEl.innerHTML = '';
    meta.tabs.forEach(tab => {
      const wrap = document.createElement('div');
      wrap.className = 'vt-tab-wrap' + (tab.id === meta.activeTab ? ' vt-tab-active' : '');
      const nameBtn = document.createElement('button');
      nameBtn.className = 'vt-tab-btn'; nameBtn.textContent = tab.name;
      nameBtn.title = 'Click to switch · Double-click to rename';
      nameBtn.addEventListener('click', () => { meta.activeTab = tab.id; ptSaveMeta(meta); ptRender(); });
      nameBtn.addEventListener('dblclick', e => {
        e.stopPropagation();
        const newName = prompt('Rename tab:', tab.name);
        if (newName && newName.trim()) { tab.name = newName.trim(); ptSaveMeta(meta); ptRender(); }
      });
      wrap.appendChild(nameBtn);
      if (meta.tabs.length > 1) {
        const delBtn = document.createElement('button'); delBtn.className = 'vt-tab-del'; delBtn.textContent = '×'; delBtn.title = 'Delete tab';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm('Delete "' + tab.name + '"?')) return;
          const idx = meta.tabs.findIndex(t => t.id === tab.id);
          meta.tabs.splice(idx, 1);
          if (meta.activeTab === tab.id) meta.activeTab = meta.tabs[Math.max(0, idx-1)].id;
          ptSaveMeta(meta); ptRender();
        });
        wrap.appendChild(delBtn);
      }
      tabsEl.appendChild(wrap);
    });
    const addBtn = document.createElement('button'); addBtn.className = 'vt-tab-add'; addBtn.textContent = '+ Add Tab';
    addBtn.addEventListener('click', () => {
      const name = prompt('Tab name:', 'Run ' + (meta.tabs.length + 1));
      if (!name || !name.trim()) return;
      const id = ptNewId();
      meta.tabs.push({ id, name: name.trim(), tier: 1, data: {} }); meta.activeTab = id;
      ptSaveMeta(meta); ptRender();
    });
    tabsEl.appendChild(addBtn);
  }

  function ptRenderTier() {
    const el = document.getElementById('petent-tracker-tier'); if (!el) return;
    const meta = ptGetMeta(); const tier = ptGetTier(meta);
    el.innerHTML = '';
    const label = document.createElement('span'); label.className = 'pt-tier-label'; label.textContent = 'Tier:'; el.appendChild(label);
    [1,2,3,4,5].forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'pt-tier-btn' + (tier === t ? ' pt-tier-active' : '');
      btn.textContent = 'Tier ' + t;
      btn.addEventListener('click', () => { const m = ptGetMeta(); ptSetTier(m,t); ptSaveMeta(m); ptRender(); });
      el.appendChild(btn);
    });
  }

  function ptMakeRow(label, note, val, onClick) {
    const cls = val === 1 ? 'vt-state-green' : ''; const icon = val === 1 ? '✓' : '○';
    const row = document.createElement('button');
    row.className = 'vt-artifact-row ' + cls;
    row.innerHTML = '<span class="vt-artifact-icon">' + icon + '</span><span class="vt-artifact-name">' + label + (note ? '<span class="pt-mob-note"> (' + note + ')</span>' : '') + '</span>';
    row.addEventListener('click', onClick);
    return row;
  }
  function ptMakeNote(text) {
    const d = document.createElement('div'); d.className = 'pt-info-note'; d.textContent = text; return d;
  }
  function ptAddSection(grid, title, items, dataObj, sectionKey, tier, noteText, questKeys) {
    const visible = tier > 1 ? items.filter(i => !i.t1) : items;
    const hdr = document.createElement('div'); hdr.className = 'pt-section-hdr'; hdr.textContent = title; grid.appendChild(hdr);
    if (noteText) grid.appendChild(ptMakeNote(noteText));
    if (!visible.length) return;
    const g = document.createElement('div'); g.className = 'pt-loc-grid';
    visible.forEach((item, idx) => {
      const key = questKeys ? idx + ':' + item.name : item.name;
      g.appendChild(ptMakeRow(item.name, item.note, (dataObj[sectionKey] || {})[key] || 0, () => {
        const m = ptGetMeta(); const d = ptGetData(m);
        d[sectionKey][key] = ((d[sectionKey][key] || 0) + 1) % 2;
        ptSetData(m, d); ptSaveMeta(m); ptRender();
      }));
    });
    grid.appendChild(g);
  }

  function ptRender() {
    if (TRACKER !== 'petent') return;
    const meta = ptGetMeta(); const data = ptGetData(meta); const tier = ptGetTier(meta);
    ptRenderTabs(meta); ptRenderTier();
    const grid = document.getElementById('petent-tracker-grid'); if (!grid) return;
    grid.innerHTML = '';
    ptAddSection(grid, 'Mob Kills — You need the last hit', PETENT_MOBS, data, 'mobs', tier, null, false);
    ptAddSection(grid, 'Boss Kills — Last hit not required', PETENT_BOSSES, data, 'bosses', tier, null, false);
    ptAddSection(grid, 'Locations', PETENT_LOCATIONS, data, 'locs', tier, null, false);
    ptAddSection(grid, 'Void Trials', PETENT_VOID_TRIALS, data, 'voidTrials', tier, 'Hold out a void key before jumping into a void to enter the trials.', false);
    ptAddSection(grid, 'Quests', PETENT_QUESTS, data, 'quests', tier, "Daze and Sky Man's Request: if you have soul tree nodes that auto-complete them, just talk to the NPC.", true);
    ptAddSection(grid, 'Final Steps', PETENT_FINAL, data, 'final', tier, null, false);
    grid.appendChild(ptMakeNote('After completing all of the above, wipe.'));
  }

  // ── ASTRA ─────────────────────────────────────────────────────────────────
  const ASTRA_EMBLEM  = [{ name: '5 Astral Shards', note: '' }, { name: 'Stellian Core', note: '' }, { name: '15k Gold', note: '' }];
  const ASTRA_ENEMIES = [
    { name: 'Goblin', note: '' }, { name: 'Thanasludd', note: '' }, { name: 'Gon', note: '' },
    { name: 'Duneguard', note: '' }, { name: 'Night Raider', note: '' }, { name: 'Ptoruco', note: '' },
    { name: 'Sentient Darkness', note: '' }, { name: 'Star Slime', note: '' }, { name: 'Arkhaia', note: '' },
  ];
  const AT_KEY = 'al-astra-tracker';
  function atGetMeta() {
    try {
      const raw = JSON.parse(localStorage.getItem(AT_KEY));
      if (raw && Array.isArray(raw.tabs)) return raw;
      return { tabs: [{ id: 'a1', name: 'Run 1', data: {} }], activeTab: 'a1' };
    } catch { return { tabs: [{ id: 'a1', name: 'Run 1', data: {} }], activeTab: 'a1' }; }
  }
  function atSaveMeta(meta) { localStorage.setItem(AT_KEY, JSON.stringify(meta)); }
  function atNewId()        { return 'a' + Date.now(); }
  function atActiveTab(meta){ return meta.tabs.find(t => t.id === meta.activeTab) || meta.tabs[0]; }
  function atGetData(meta)  { const d = atActiveTab(meta).data; if (!d.emblem) d.emblem={}; if (!d.enemies) d.enemies={}; return d; }
  function atSetData(meta,d){ atActiveTab(meta).data = d; }

  function atRenderTabs(meta) {
    const tabsEl = document.getElementById('astra-tracker-tabs'); if (!tabsEl) return;
    tabsEl.innerHTML = '';
    meta.tabs.forEach(tab => {
      const wrap = document.createElement('div');
      wrap.className = 'vt-tab-wrap' + (tab.id === meta.activeTab ? ' vt-tab-active' : '');
      const nameBtn = document.createElement('button');
      nameBtn.className = 'vt-tab-btn'; nameBtn.textContent = tab.name;
      nameBtn.title = 'Click to switch · Double-click to rename';
      nameBtn.addEventListener('click', () => { meta.activeTab = tab.id; atSaveMeta(meta); atRender(); });
      nameBtn.addEventListener('dblclick', e => {
        e.stopPropagation();
        const newName = prompt('Rename tab:', tab.name);
        if (newName && newName.trim()) { tab.name = newName.trim(); atSaveMeta(meta); atRender(); }
      });
      wrap.appendChild(nameBtn);
      if (meta.tabs.length > 1) {
        const delBtn = document.createElement('button'); delBtn.className = 'vt-tab-del'; delBtn.textContent = '×'; delBtn.title = 'Delete tab';
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm('Delete "' + tab.name + '"?')) return;
          const idx = meta.tabs.findIndex(t => t.id === tab.id);
          meta.tabs.splice(idx, 1);
          if (meta.activeTab === tab.id) meta.activeTab = meta.tabs[Math.max(0, idx-1)].id;
          atSaveMeta(meta); atRender();
        });
        wrap.appendChild(delBtn);
      }
      tabsEl.appendChild(wrap);
    });
    const addBtn = document.createElement('button'); addBtn.className = 'vt-tab-add'; addBtn.textContent = '+ Add Tab';
    addBtn.addEventListener('click', () => {
      const name = prompt('Tab name:', 'Run ' + (meta.tabs.length + 1));
      if (!name || !name.trim()) return;
      const id = atNewId();
      meta.tabs.push({ id, name: name.trim(), data: {} }); meta.activeTab = id;
      atSaveMeta(meta); atRender();
    });
    tabsEl.appendChild(addBtn);
  }

  function atMakeRow(label, note, val, onClick) {
    const cls = val === 1 ? 'vt-state-green' : ''; const icon = val === 1 ? '✓' : '○';
    const row = document.createElement('button');
    row.className = 'vt-artifact-row ' + cls;
    row.innerHTML = '<span class="vt-artifact-icon">' + icon + '</span><span class="vt-artifact-name">' + label + (note ? '<span class="pt-mob-note"> (' + note + ')</span>' : '') + '</span>';
    row.addEventListener('click', onClick);
    return row;
  }

  function atRender() {
    if (TRACKER !== 'astra') return;
    const meta = atGetMeta(); const data = atGetData(meta);
    atRenderTabs(meta);
    const grid = document.getElementById('astra-tracker-grid'); if (!grid) return;
    grid.innerHTML = '';
    const emblemHdr = document.createElement('div'); emblemHdr.className = 'pt-section-hdr'; emblemHdr.textContent = 'Celestial Emblem'; grid.appendChild(emblemHdr);
    const emblemGrid = document.createElement('div'); emblemGrid.className = 'pt-loc-grid';
    ASTRA_EMBLEM.forEach(({name, note}) => {
      emblemGrid.appendChild(atMakeRow(name, note, data.emblem[name] || 0, () => {
        const m = atGetMeta(); const d = atGetData(m);
        d.emblem[name] = ((d.emblem[name] || 0) + 1) % 2;
        atSetData(m,d); atSaveMeta(m); atRender();
      }));
    });
    grid.appendChild(emblemGrid);
    const wipeNote = document.createElement('div'); wipeNote.className = 'pt-info-note'; wipeNote.textContent = 'Make sure to wipe while having the Celestial Emblem equipped.'; grid.appendChild(wipeNote);
    const enemyHdr = document.createElement('div'); enemyHdr.className = 'pt-section-hdr'; enemyHdr.textContent = 'Celestial Enemies'; grid.appendChild(enemyHdr);
    const enemyGrid = document.createElement('div'); enemyGrid.className = 'pt-loc-grid';
    ASTRA_ENEMIES.forEach(({name, note}) => {
      enemyGrid.appendChild(atMakeRow(name, note, data.enemies[name] || 0, () => {
        const m = atGetMeta(); const d = atGetData(m);
        d.enemies[name] = ((d.enemies[name] || 0) + 1) % 2;
        atSetData(m,d); atSaveMeta(m); atRender();
      }));
    });
    grid.appendChild(enemyGrid);
  }

  // ── Initial render ────────────────────────────────────────────────────────
  if (TRACKER === 'venia')  vtRender();
  if (TRACKER === 'petent') ptRender();
  if (TRACKER === 'astra')  atRender();

  // ── Sync: re-render when another tab/window writes to localStorage ────────
  window.addEventListener('storage', e => {
    const keys = { venia: VT_KEY, petent: PT_KEY, astra: AT_KEY };
    if (e.key === keys[TRACKER]) {
      if (TRACKER === 'venia')  vtRender();
      if (TRACKER === 'petent') ptRender();
      if (TRACKER === 'astra')  atRender();
    }
  });
})();
</script>
</body>
</html>
