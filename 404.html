<!DOCTYPE html>
<html>
<script>
  // Save the intended path so index.html can load it
  sessionStorage.setItem('alb-redirect', JSON.stringify({
    path: window.location.pathname,
    search: window.location.search
  }));
  // Redirect to the app root
  var repo = window.location.pathname.split('/').filter(Boolean)[0];
  window.location.replace(window.location.origin + '/' + repo + '/');
</script>
</html>
